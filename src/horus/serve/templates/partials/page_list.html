{% if pages %}
  {% for page in pages %}
  <div class="card">
    <div class="card-title">{{ page.title or '(no title)' }}</div>
    <div class="card-url">
      <a href="{{ page.url }}" target="_blank" rel="noopener">{{ page.url }}</a>
    </div>
    <div class="card-meta">
      <span class="tag">{{ page.site_id }}</span>
      {{ page.fetched_at.strftime('%Y-%m-%d %H:%M') }}
    </div>
    <div class="card-snippet">{{ page.markdown[:200].replace('\n', ' ') }}…</div>
    <div style="margin-top:.5rem;text-align:right;">
      <button class="btn btn-sm btn-danger"
              hx-delete="/pages?url={{ page.url | urlencode }}"
              hx-confirm="刪除此頁面？"
              hx-target="closest .card"
              hx-swap="outerHTML">
        刪除
      </button>
    </div>
  </div>
  {% endfor %}
{% else %}
  <p style="color:#666;margin-top:1rem;">No pages found.</p>
{% endif %}
